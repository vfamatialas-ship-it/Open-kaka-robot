# 左从臂配置模板：达妙电机 + USB2CAN
arm:
  name: slave_left
  role: slave
  side: left

safety:
  default_read_only: true
  auto_enable_on_startup: false
  auto_home_on_startup: false
  require_position_read_before_motion: true
  require_limit_check_before_motion: true
  emergency_stop_enabled: true
  require_double_confirm_before_save_zero: true

bus:
  type: usb2can
  channel: can0
  bitrate: 1000000
  timeout_s: 0.1

joints:
  - name: joint1
    index: 1
    motor_model: DM-J4030P-2EC
    can_id: 0x01
    direction: 1
    zero_offset_rad: 0.0
    limit_min_rad: -3.1416
    limit_max_rad: 3.1416
    max_velocity_rad_s: 0.5
    max_torque_nm: 1.0
  - name: joint2
    index: 2
    motor_model: DM-J4030P-2EC
    can_id: 0x02
    direction: 1
    zero_offset_rad: 0.0
    limit_min_rad: -3.1416
    limit_max_rad: 3.1416
    max_velocity_rad_s: 0.5
    max_torque_nm: 1.0
  - name: joint3
    index: 3
